name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # release-please will create a PR titled "chore: release X.Y.Z".
      # Merging that PR creates the git tag (e.g., v0.10.0), which then
      # triggers .github/workflows/publish.yml to build & push GHCR images.
